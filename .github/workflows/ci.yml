name: CI
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types: [opened, synchronize, reopened]
# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Only test on a subset of possible platforms.
        include:
          - version: '1'  # The latest point-release (Linux)
            os: ubuntu-latest
            arch: x64
          - version: '1'  # The latest point-release (Windows)
            os: windows-latest
            arch: x64
          - version: '1.10'  # 1.10 LTS (64-bit Linux)
            os: ubuntu-latest
            arch: x64
          - version: '1.10'  # 1.10 LTS (64-bit Windows)
            os: windows-latest
            arch: x64
          - version: '1.10'  # 1.10 LTS (64-bit Mac Intel)
            os: macos-15-intel
            arch: x64
          - version: '1.10'  # 1.10 LTS (64-bit Mac Arm)
            os: macOS-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Add unregistered dependencies
        run: julia -e 'using Pkg; Pkg.activate("."); Pkg.add(url="https://github.com/JuliaBinaryWrappers/gdx_jll.jl.git")'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
